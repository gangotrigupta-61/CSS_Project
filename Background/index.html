<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background</title>


    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Oswald:wght@200..700&display=swap" rel="stylesheet">
      

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Manrope:wght@200..800&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Oswald:wght@200..700&family=Playwrite+ID:wght@100..400&family=Yuyu&family=Yuyu+Short&display=swap" rel="stylesheet">

    <style>

     body{
       background-color: rgb(210, 235, 234);
        font-family: Arial, sans-serif;
        margin:0px;
        padding: 20px;
        }


        
    .hero{
        background-image: url("images.jpg");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        color:rgb(241, 235, 235);
        
        height: 300px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        border-radius: 5px;
        margin-bottom: 20px;
    
    }

    .card{
        background-color: rgb(2, 30, 30);
        color: rgb(230, 112, 9);
        padding: 20px;
        border-radius: 10px;
        margin:20px auto;
        box-shadow: (0px,2px,8px);

        }

        h1{
            background-color: rgba(0, 0, 0, 0.5);
            border-radius: 5px;
            padding: 15px;

           
  font-family: "Black Ops One", system-ui;
  font-weight: 400;
  font-style: normal;
           
       }


     
       p{
        font-family: "Yuyu", sans-serif;
         font-weight: 400;
          font-style: normal;
       }

  
  

       






    </style>
</head>
<body>
    
    <section class="hero">
        <h1>Welcome to my Website</h1>
    </section>

    <div class="card">
        <H2>Card Title</H2>
   

    <p>
      this card uses a faint teal Background created with 
      <strong>   rgba()</strong>
     and a dark teal text color using
       <strong> hsl()</strong>
     
    </p>
     </div>



     <div id="phone">
        <h2>&phone;</h2>
     </div>


<p>

</p>

      
</body>
